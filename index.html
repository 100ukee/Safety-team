<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전공급팀 종합 관제센터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Pretendard', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100">

  <div class="flex h-screen">

    <!-- 사이드바 -->
    <div class="w-72 bg-gray-900 border-r border-gray-700 flex flex-col">
      <div class="p-6 border-b border-gray-700">
        <h1 class="text-2xl font-bold text-white flex items-center gap-3">
          <i class="fas fa-shield-alt text-blue-500"></i>
          안전공급팀
        </h1>
        <p class="text-gray-400 text-sm mt-1">종합 관제센터</p>
      </div>

      <div class="flex-1 p-4 overflow-y-auto">
        <div class="space-y-1">
          <a href="?view=dashboard" class="menu-item flex items-center justify-between px-4 py-3 rounded-xl hover:bg-gray-800 transition-colors">
            <div class="flex items-center gap-3">
              <i class="fas fa-home w-5"></i>
              <span>오늘의 현황</span>
            </div>
            <button onclick="openNewWindow('dashboard'); event.stopImmediatePropagation();" 
                    class="text-xs bg-gray-700 hover:bg-blue-600 px-3 py-1 rounded-lg">
              새 창
            </button>
          </a>

          <a href="?view=teamstatus" class="menu-item flex items-center justify-between px-4 py-3 rounded-xl hover:bg-gray-800 transition-colors">
            <div class="flex items-center gap-3">
              <i class="fas fa-users w-5"></i>
              <span>팀원 동향</span>
            </div>
            <button onclick="openNewWindow('teamstatus'); event.stopImmediatePropagation();" 
                    class="text-xs bg-gray-700 hover:bg-blue-600 px-3 py-1 rounded-lg">
              새 창
            </button>
          </a>

          <a href="?view=taskboard" class="menu-item flex items-center justify-between px-4 py-3 rounded-xl hover:bg-gray-800 transition-colors">
            <div class="flex items-center gap-3">
              <i class="fas fa-clipboard-list w-5"></i>
              <span>업무 현황판</span>
            </div>
            <button onclick="openNewWindow('taskboard'); event.stopImmediatePropagation();" 
                    class="text-xs bg-gray-700 hover:bg-blue-600 px-3 py-1 rounded-lg">
              새 창
            </button>
          </a>

          <!-- 필요하면 아래 메뉴들도 추가 가능 -->
          <!-- <a href="?view=mytasks" ... >내 업무</a> 등 -->
        </div>
      </div>

      <div class="p-4 border-t border-gray-700 text-xs text-gray-500">
        Powered by Supabase
      </div>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <div class="flex-1 flex flex-col">
      <header class="h-16 bg-gray-900 border-b border-gray-700 flex items-center px-8">
        <h2 id="pageTitle" class="text-xl font-semibold">오늘의 현황</h2>
      </header>
      
      <div class="flex-1 p-8 overflow-auto">
        <div id="content" class="text-center py-20">
          <p class="text-gray-400 text-lg">뷰를 선택해주세요. (새 창 버튼을 눌러보세요)</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // URL에서 view 파라미터 읽기
    function getCurrentView() {
      const params = new URLSearchParams(window.location.search);
      return params.get('view') || 'dashboard';
    }

    // 창 제목 설정
    function setPageTitle(view) {
      const titles = {
        'dashboard': '오늘의 현황',
        'teamstatus': '팀원 동향',
        'taskboard': '업무 현황판',
        'mytasks': '내 업무',
        'goals': '목표 관리',
        'schedule': '일정 관리',
        'notice': '공지사항',
        'performance': '실적 관리',
        'admin': '관리자'
      };
      document.getElementById('pageTitle').textContent = titles[view] || '종합 관제센터';
      document.title = `안전공급팀 - ${titles[view] || '관제센터'}`;
    }

    // 새 창으로 열기
    function openNewWindow(view) {
      const url = `${window.location.origin}${window.location.pathname}?view=${view}`;
      window.open(url, `_blank`, `width=1350,height=880,menubar=no,toolbar=no,scrollbars=yes,resizable=yes`);
    }

    // 페이지 로드 시 실행
    window.onload = function() {
      const view = getCurrentView();
      setPageTitle(view);
      
      // 여기서 Supabase로 데이터 불러오는 코드 넣을 예정
      console.log('현재 뷰:', view);
    };
  </script>
</body>
</html>
