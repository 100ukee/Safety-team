<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전공급팀 종합 관제센터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
    body { font-family: 'Pretendard', system-ui, sans-serif; }
    .sidebar-link { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar-link:hover { transform: translateX(10px); background-color: #27272a; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen overflow-hidden">

  <!-- 로그인 모달 -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-10 w-full max-w-md">
      <h2 class="text-3xl font-bold mb-8 text-center">로그인</h2>
      <input id="email" type="email" placeholder="이메일" class="w-full bg-zinc-800 rounded-2xl px-6 py-4 mb-4 outline-none">
      <input id="password" type="password" placeholder="비밀번호" class="w-full bg-zinc-800 rounded-2xl px-6 py-4 mb-6 outline-none">
      <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-medium text-lg">로그인</button>
      <p id="loginMessage" class="text-center text-red-400 mt-4 text-sm"></p>
      <p class="text-center text-zinc-500 text-xs mt-8">Supabase 연동됨 • 처음이면 Supabase에서 계정 만들어주세요</p>
    </div>
  </div>

  <div class="flex h-screen">

    <!-- 사이드바 -->
    <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-8 border-b border-zinc-800">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center">
            <i class="fas fa-shield-alt text-white text-3xl"></i>
          </div>
          <div>
            <h1 class="text-3xl font-bold">안전공급팀</h1>
            <p class="text-zinc-400 text-sm">종합 관제센터</p>
          </div>
        </div>
      </div>

      <div class="flex-1 p-6 space-y-2 overflow-y-auto" id="sidebarMenu">
        <!-- JS에서 동적으로 생성 -->
      </div>
    </div>

    <!-- 메인 영역 -->
    <div class="flex-1 flex flex-col">
      <header class="h-20 bg-zinc-900 border-b border-zinc-800 px-10 flex items-center justify-between">
        <h2 id="pageTitle" class="text-3xl font-semibold"></h2>
        <div class="flex items-center gap-4">
          <span id="userInfo" class="text-sm text-zinc-400"></span>
          <button onclick="logout()" class="text-xs bg-zinc-800 hover:bg-red-600 px-5 py-2 rounded-2xl">로그아웃</button>
        </div>
      </header>

      <div class="flex-1 p-10 overflow-auto" id="mainContent">
        <!-- 각 뷰 내용이 여기 들어감 -->
      </div>
    </div>
  </div>

  <script>
    // === Supabase 설정 (여기만 너가 수정하면 됨) ===
    const SUPABASE_URL = 'https://uiqjehgbvmickundcdiz.supabase.co';   // ← 너의 Supabase URL
    const SUPABASE_ANON_KEY = '여기에_너의_anon_key_붙여넣기';       // ← Supabase → Project Settings → API → anon public key
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentData = { dashboard: {}, teamstatus: {}, taskboard: {} };

    // 메뉴 정의
    const menuItems = [
      { view: 'dashboard', icon: 'fa-house', label: '오늘의 현황', color: 'blue' },
      { view: 'teamstatus', icon: 'fa-users', label: '팀원 동향', color: 'emerald' },
      { view: 'taskboard', icon: 'fa-clipboard-list', label: '업무 현황판', color: 'amber' }
    ];

    function renderSidebar() {
      const sidebar = document.getElementById('sidebarMenu');
      sidebar.innerHTML = menuItems.map(item => `
        <a href="?view=${item.view}" class="sidebar-link flex items-center justify-between px-6 py-4 rounded-3xl text-lg font-medium">
          <div class="flex items-center gap-4">
            <i class="fas ${item.icon} w-6 text-${item.color}-400"></i>
            <span>${item.label}</span>
          </div>
          <button onclick="openNewWindow('${item.view}'); event.preventDefault(); event.stopImmediatePropagation()" 
                  class="text-sm px-5 py-2 bg-zinc-800 hover:bg-blue-600 rounded-2xl flex items-center gap-2">
            <i class="fas fa-external-link-alt"></i> 새 창
          </button>
        </a>
      `).join('');
    }

    function getView() {
      const params = new URLSearchParams(window.location.search);
      return params.get('view') || 'dashboard';
    }

    function setTitle(view) {
      const titles = { dashboard: '오늘의 현황', teamstatus: '팀원 동향', taskboard: '업무 현황판' };
      const titleText = titles[view] || '종합 관제센터';
      document.getElementById('pageTitle').textContent = titleText;
      document.title = `안전공급팀 - ${titleText}`;
    }

    // 로그인
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const message = document.getElementById('loginMessage');

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        message.textContent = '로그인 실패: ' + error.message;
        return;
      }
      currentUser = data.user;
      document.getElementById('loginModal').classList.add('hidden');
      document.getElementById('userInfo').innerHTML = `👤 ${currentUser.email}`;
      loadData();
    }

    function logout() {
      supabase.auth.signOut();
      currentUser = null;
      document.getElementById('userInfo').innerHTML = '';
      document.getElementById('loginModal').classList.remove('hidden');
    }

    // 데이터 불러오기 & 저장 (Supabase + localStorage 백업)
    async function loadData() {
      if (!currentUser) return;
      const { data } = await supabase.from('safety_dashboard').select('*').eq('user_id', currentUser.id).single();
      if (data) currentData = data.content || currentData;
      renderCurrentView();
    }

    async function saveData() {
      if (!currentUser) return;
      await supabase.from('safety_dashboard').upsert({
        user_id: currentUser.id,
        content: currentData
      });
      renderCurrentView();
    }

    // 각 뷰별 입력 폼 + 출력
    function renderCurrentView() {
      const view = getView();
      const area = document.getElementById('mainContent');
      setTitle(view);

      if (view === 'dashboard') {
        area.innerHTML = `
          <div class="max-w-4xl mx-auto">
            <h3 class="text-2xl font-semibold mb-8">수동 입력</h3>
            <div class="grid grid-cols-3 gap-6">
              <div>
                <label class="block text-zinc-400 mb-2">현재 근무 인원</label>
                <input id="dash_staff" type="number" value="${currentData.dashboard.staff || 12}" 
                       class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-3xl font-bold">
              </div>
              <div>
                <label class="block text-zinc-400 mb-2">오늘 처리 업무</label>
                <input id="dash_tasks" type="number" value="${currentData.dashboard.tasks || 47}" 
                       class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-3xl font-bold">
              </div>
              <div>
                <label class="block text-zinc-400 mb-2">긴급 상황</label>
                <input id="dash_emergency" type="number" value="${currentData.dashboard.emergency || 0}" 
                       class="w-full bg-zinc-800 rounded-2xl px-6 py-4 text-3xl font-bold text-red-400">
              </div>
            </div>
            <button onclick="saveDashboard()" class="mt-10 bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-2xl text-lg font-medium">저장하기</button>
            
            <div class="mt-12 grid grid-cols-3 gap-6">
              <div class="bg-zinc-900 rounded-3xl p-8 text-center">
                <p class="text-zinc-400">현재 근무</p>
                <p class="text-6xl font-bold mt-4">${currentData.dashboard.staff || 12}</p>
              </div>
              <div class="bg-zinc-900 rounded-3xl p-8 text-center">
                <p class="text-zinc-400">오늘 처리 업무</p>
                <p class="text-6xl font-bold mt-4">${currentData.dashboard.tasks || 47}</p>
              </div>
              <div class="bg-zinc-900 rounded-3xl p-8 text-center">
                <p class="text-red-400">긴급 상황</p>
                <p class="text-6xl font-bold mt-4">${currentData.dashboard.emergency || 0}</p>
              </div>
            </div>
          </div>`;
      } 
      else if (view === 'teamstatus') {
        // 팀원 동향 입력 폼 (간단 버전)
        area.innerHTML = `<div class="max-w-4xl mx-auto text-center py-20">
          <p class="text-2xl mb-8">팀원 동향 입력 기능 준비중</p>
          <p class="text-zinc-400">곧 더 많은 입력 항목 추가할게요!</p>
        </div>`;
      } 
      else if (view === 'taskboard') {
        area.innerHTML = `<div class="max-w-4xl mx-auto text-center py-20">
          <p class="text-2xl mb-8">업무 현황판 입력 기능 준비중</p>
          <p class="text-zinc-400">곧 더 많은 입력 항목 추가할게요!</p>
        </div>`;
      }
    }

    function saveDashboard() {
      currentData.dashboard = {
        staff: parseInt(document.getElementById('dash_staff').value) || 0,
        tasks: parseInt(document.getElementById('dash_tasks').value) || 0,
        emergency: parseInt(document.getElementById('dash_emergency').value) || 0
      };
      saveData();
    }

    function openNewWindow(view) {
      const url = window.location.origin + window.location.pathname + '?view=' + view;
      window.open(url, '_blank', 'width=1480,height=960,menubar=no,toolbar=no,scrollbars=yes,resizable=yes');
    }

    // 초기화
    window.onload = async () => {
      renderSidebar();

      // 로그인 상태 체크
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        currentUser = session.user;
        document.getElementById('userInfo').innerHTML = `👤 ${currentUser.email}`;
        loadData();
      } else {
        document.getElementById('loginModal').classList.remove('hidden');
      }
    };
  </script>
</body>
</html>
