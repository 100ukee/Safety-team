<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전공급팀 종합 관제센터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
    body { font-family: 'Pretendard', system-ui, sans-serif; }
    
    .sidebar-link {
      transition: all 0.25s cubic-bezier(0.4, 0.0, 0.2, 1);
    }
    .sidebar-link:hover {
      transform: translateX(10px);
      background-color: #27272a;
    }
    .new-window-btn:hover {
      background-color: #2563eb;
      transform: scale(1.08);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen overflow-hidden">

  <div class="flex h-screen">

    <!-- 사이드바 -->
    <div class="w-80 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-8 border-b border-zinc-800">
        <div class="flex items-center gap-4">
          <div class="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg">
            <i class="fas fa-shield-alt text-white text-3xl"></i>
          </div>
          <div>
            <h1 class="text-3xl font-bold">안전공급팀</h1>
            <p class="text-zinc-400 text-sm -mt-1">종합 관제센터</p>
          </div>
        </div>
      </div>

      <div class="flex-1 p-6 space-y-2 overflow-y-auto">
        <a href="?view=dashboard" class="sidebar-link flex items-center justify-between px-6 py-4 rounded-3xl text-lg font-medium">
          <div class="flex items-center gap-4">
            <i class="fas fa-house w-6 text-blue-400"></i>
            <span>오늘의 현황</span>
          </div>
          <button onclick="openNewWindow('dashboard'); event.preventDefault(); event.stopImmediatePropagation()" 
                  class="new-window-btn text-sm px-5 py-2 bg-zinc-800 rounded-2xl flex items-center gap-2">
            <i class="fas fa-external-link-alt"></i> 새 창
          </button>
        </a>

        <a href="?view=teamstatus" class="sidebar-link flex items-center justify-between px-6 py-4 rounded-3xl text-lg font-medium">
          <div class="flex items-center gap-4">
            <i class="fas fa-users w-6 text-emerald-400"></i>
            <span>팀원 동향</span>
          </div>
          <button onclick="openNewWindow('teamstatus'); event.preventDefault(); event.stopImmediatePropagation()" 
                  class="new-window-btn text-sm px-5 py-2 bg-zinc-800 rounded-2xl flex items-center gap-2">
            <i class="fas fa-external-link-alt"></i> 새 창
          </button>
        </a>

        <a href="?view=taskboard" class="sidebar-link flex items-center justify-between px-6 py-4 rounded-3xl text-lg font-medium">
          <div class="flex items-center gap-4">
            <i class="fas fa-clipboard-list w-6 text-amber-400"></i>
            <span>업무 현황판</span>
          </div>
          <button onclick="openNewWindow('taskboard'); event.preventDefault(); event.stopImmediatePropagation()" 
                  class="new-window-btn text-sm px-5 py-2 bg-zinc-800 rounded-2xl flex items-center gap-2">
            <i class="fas fa-external-link-alt"></i> 새 창
          </button>
        </a>
      </div>

      <div class="p-6 border-t border-zinc-800 text-xs text-zinc-500 text-center">
        Real-time • Supabase
      </div>
    </div>

    <!-- 메인 영역 -->
    <div class="flex-1 flex flex-col">
      <header class="h-20 bg-zinc-900 border-b border-zinc-800 px-10 flex items-center justify-between">
        <h2 id="pageTitle" class="text-3xl font-semibold">오늘의 현황</h2>
        <div class="flex items-center gap-3 text-emerald-400 text-sm">
          <i class="fas fa-circle animate-pulse"></i>
          실시간 연결 중
        </div>
      </header>

      <div class="flex-1 p-10 overflow-auto" id="mainContent">
        <!-- 여기에 view에 따라 내용이 바뀜 -->
      </div>
    </div>
  </div>

  <script>
    const views = {
      dashboard: `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-lg text-zinc-400 mb-2">현재 근무 인원</h3>
            <p class="text-6xl font-bold text-white">12<span class="text-2xl text-emerald-400">/18</span></p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-lg text-zinc-400 mb-2">오늘 처리 업무</h3>
            <p class="text-6xl font-bold text-white">47</p>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <h3 class="text-lg text-zinc-400 mb-2">긴급 상황</h3>
            <p class="text-6xl font-bold text-red-400">0</p>
          </div>
        </div>
        <div class="mt-10">
          <h3 class="text-xl font-semibold mb-6">최근 활동</h3>
          <div class="space-y-4">
            <div class="bg-zinc-900 rounded-2xl p-6">• 김팀장 - 14:22 현장 점검 완료</div>
            <div class="bg-zinc-900 rounded-2xl p-6">• 이과장 - 13:45 안전교육 진행</div>
          </div>
        </div>
      `,

      teamstatus: `
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h3 class="text-2xl font-semibold mb-8">팀원 동향</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-zinc-800 rounded-2xl p-6">
              <p class="text-emerald-400 font-medium">● 근무 중</p>
              <p class="text-4xl mt-4">8명</p>
            </div>
            <div class="bg-zinc-800 rounded-2xl p-6">
              <p class="text-amber-400 font-medium">● 휴식 중</p>
              <p class="text-4xl mt-4">3명</p>
            </div>
          </div>
        </div>
      `,

      taskboard: `
        <div class="bg-zinc-900 rounded-3xl p-8">
          <h3 class="text-2xl font-semibold mb-6">업무 현황판</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-red-900/30 border border-red-500 rounded-2xl p-6">
              <h4 class="font-medium text-red-400">긴급 업무</h4>
              <p class="text-5xl mt-4">3</p>
            </div>
            <div class="bg-amber-900/30 border border-amber-500 rounded-2xl p-6">
              <h4 class="font-medium text-amber-400">진행 중</h4>
              <p class="text-5xl mt-4">12</p>
            </div>
            <div class="bg-emerald-900/30 border border-emerald-500 rounded-2xl p-6">
              <h4 class="font-medium text-emerald-400">완료</h4>
              <p class="text-5xl mt-4">32</p>
            </div>
          </div>
        </div>
      `
    };

    function getView() {
      const params = new URLSearchParams(window.location.search);
      return params.get('view') || 'dashboard';
    }

    function setTitle(view) {
      const titles = {
        dashboard: '오늘의 현황',
        teamstatus: '팀원 동향',
        taskboard: '업무 현황판'
      };
      const titleText = titles[view] || '종합 관제센터';
      document.getElementById('pageTitle').textContent = titleText;
      document.title = `안전공급팀 - ${titleText}`;
    }

    function renderContent(view) {
      const contentArea = document.getElementById('mainContent');
      contentArea.innerHTML = views[view] || views.dashboard;
    }

    function openNewWindow(view) {
      const url = window.location.origin + window.location.pathname + '?view=' + view;
      window.open(url, '_blank', 'width=1480,height=960,menubar=no,toolbar=no,scrollbars=yes,resizable=yes');
    }

    // 페이지 로드
    window.onload = () => {
      const currentView = getView();
      setTitle(currentView);
      renderContent(currentView);
    };
  </script>
</body>
</html>
